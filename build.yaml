builders:
  nav:
    import: "package:canon_generator/canon_generator.dart"
    builder_factories: ["navBuilder"]
    build_extensions: {".dart": [".canon.dart"]}
    auto_apply: dependents
    build_to: source
    # Phase before mappable: its mappers may reference the generated @IDs
    # extension types (an entity's `AdId id` field), and build_runner hides a
    # generated asset from builders phased before its generator.
    runs_before: ["dart_mappable_builder:dart_mappable_builder"]

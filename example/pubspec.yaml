name: canon_example
description: Minimal example of the canon navigation package and its generator.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.0

dependencies:
  canon: ^0.16.0 # re-exports Codec — no separate canon_codec dep needed
  flutter:
    sdk: flutter
dev_dependencies:
  build_runner: ^2.15.0
  canon_generator: ^0.21.0
  flutter_test:
    sdk: flutter

# The example lives in the generator's repo, so canon_generator resolves
# path-to-self (resolves in publish CI); canon comes from pub. analyzer ^13 is
# forced for the codegen toolchain. (For local dev against an unpublished
# canon, add its path in a git-ignored pubspec_overrides.yaml.)
dependency_overrides:
  canon_generator:
    path: ../
  analyzer: ^13.0.0
  dart_style: ^3.1.9
